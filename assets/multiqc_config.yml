report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/spatialaxe/tree/dev" target="_blank">nf-core/spatialaxe</a> analysis pipeline. For information about how to interpret these results, please see the <a href="https://nf-co.re/spatialaxe/dev/docs/output" target="_blank">documentation</a>.
report_section_order:
  "nf-core-spatialaxe-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-core-spatialaxe-summary":
    order: -1002

export_plots: true

disable_version_detection: true

run_module:
  - xenium

module_order:
  - xenium

sp:
  cell_feature_matrix:
    fn: cell_feature_matrix.h5
  cells:
    fn: cells.parquet
  experiment:
    fn: experiment.xenium
    num_lines: 50
  metrics:
    contents: num_cells_detected
    fn: metrics_summary.csv
    num_lines: 5
  transcripts:
    fn: transcripts.parquet

custom_data:
  focus_density_plot:
    pconfig:
      title: "Focus Score: Per Sequence Density"
      xlab: "CCFS Focus Score"
      ylab: "Density"
      ymin: 0
      logswitch: false
