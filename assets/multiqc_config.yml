report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/spatialxe/tree/dev" target="_blank">nf-core/spatialxe</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://nf-co.re/spatialxe/dev/docs/output" target="_blank">documentation</a>.
report_section_order:
  "nf-core-spatialxe-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-core-spatialxe-summary":
    order: -1002

export_plots: true

disable_version_detection: true

log_filesize_limit: 5000000000 # 5GB

sp:
  xenium/cell_feature_matrix:
    fn: "*/cell_feature_matrix.h5"
  xenium/cells:
    fn: "*/cells.parquet"
  xenium/experiment:
    fn: "*/experiment.xenium"
    num_lines: 50
  xenium/metrics:
    contents: num_cells_detected
    fn: "*/metrics_summary.csv"
    num_lines: 5
  xenium/transcripts:
    fn: "*/transcripts.parquet"
