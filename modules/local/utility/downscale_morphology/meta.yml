name: "downscale_morphology"
description: Pre-downscale a morphology image so that cellpose's internal rescaling does not exceed memory limits.
keywords:
  - xenium
  - morphology
  - downscale
  - image processing
  - cellpose
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "tifffile":
      description: |
        Read and write TIFF files, including BigTIFF and OME-TIFF, in Python.
      homepage: "https://github.com/cgohlke/tifffile"
      documentation: "https://github.com/cgohlke/tifffile"
      tool_dev_url: "https://github.com/cgohlke/tifffile"
      doi: "no DOI available"
      licence: ["BSD-3-Clause"]
      identifier: ""
  - "scikit-image":
      description: |
        Image processing library for Python (scikit-image), used here for
        anti-aliased image resizing.
      homepage: "https://scikit-image.org/"
      documentation: "https://scikit-image.org/docs/stable/"
      tool_dev_url: "https://github.com/scikit-image/scikit-image"
      doi: "10.7717/peerj.453"
      licence: ["BSD-3-Clause"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - image:
        type: file
        description: Morphology OME-TIFF image.
        pattern: "*.{ome.tif,ome.tiff,tif,tiff}"
        ontologies: []

output:
  downscaled:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*/downscaled.tif":
          type: file
          description: Downscaled TIFF image.
          pattern: "*/downscaled.tif"
          ontologies: []
  scale_info:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*/scale_info.json":
          type: file
          description: JSON file with scale factor and original/new dimensions.
          pattern: "*/scale_info.json"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_tifffile:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool
  versions_skimage:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - scikit-image:
          type: string
          description: The tool name
      - 'python3 -c "import skimage; print(skimage.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - scikit-image:
          type: string
          description: The tool name
      - 'python3 -c "import skimage; print(skimage.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@an-altosian"
maintainers:
  - "@an-altosian"
