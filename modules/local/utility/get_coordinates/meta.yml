name: "get_transcripts_coordinates"
description: Read a transcripts parquet file and emit the transcript bounding-box coordinates to stdout.
keywords:
  - xenium
  - transcripts
  - coordinates
  - parquet
  - bounding-box
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "pandas":
      description: |
        Powerful data structures for data analysis, time series, and statistics.
      homepage: "https://pandas.pydata.org/"
      documentation: "https://pandas.pydata.org/docs/"
      tool_dev_url: "https://github.com/pandas-dev/pandas"
      doi: "10.5281/zenodo.3509134"
      licence: ["BSD-3-Clause"]
      identifier: ""
  - "pyarrow":
      description: |
        Python bindings for Apache Arrow, used to read Parquet files efficiently.
      homepage: "https://arrow.apache.org/"
      documentation: "https://arrow.apache.org/docs/python/"
      tool_dev_url: "https://github.com/apache/arrow"
      doi: "no DOI available"
      licence: ["Apache-2.0"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - transcripts:
        type: file
        description: Transcripts parquet file from the Xenium bundle.
        pattern: "*.parquet"
        ontologies: []

output:
  stdout:
    - stdout:
        type: string
        description: Comma-separated transcript bounding-box coordinates printed to stdout.
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@khersameesh24"
maintainers:
  - "@khersameesh24"
