name: "extract_preview_data"
description: Parse a Xenium preview HTML report and extract MultiQC-compatible TSV tables and embedded plot images.
keywords:
  - xenium
  - preview
  - multiqc
  - html
  - parsing
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "beautifulsoup4":
      description: |
        Python library for pulling data out of HTML and XML files.
      homepage: "https://www.crummy.com/software/BeautifulSoup/"
      documentation: "https://www.crummy.com/software/BeautifulSoup/bs4/doc/"
      tool_dev_url: "https://git.launchpad.net/beautifulsoup"
      doi: "no DOI available"
      licence: ["MIT"]
      identifier: ""
  - "pandas":
      description: |
        Powerful data structures for data analysis, time series, and statistics.
      homepage: "https://pandas.pydata.org/"
      documentation: "https://pandas.pydata.org/docs/"
      tool_dev_url: "https://github.com/pandas-dev/pandas"
      doi: "10.5281/zenodo.3509134"
      licence: ["BSD-3-Clause"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - preview_html:
        type: file
        description: Xenium preview HTML report to extract data from.
        pattern: "*.html"
        ontologies: []

output:
  mqc_data:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${prefix}/*_mqc.tsv":
          type: file
          description: MultiQC-compatible TSV tables extracted from the preview HTML.
          pattern: "*_mqc.tsv"
          ontologies: []
  mqc_img:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${prefix}/*_mqc.png":
          type: file
          description: MultiQC-compatible PNG plot images extracted from the preview HTML.
          pattern: "*_mqc.png"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@khersameesh24"
maintainers:
  - "@khersameesh24"
