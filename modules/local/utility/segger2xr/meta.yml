name: "segger2xr"
description: Convert SEGGER segmentation output (transcripts parquet with cell assignments) into XeniumRanger-compatible segmentation files.
keywords:
  - xenium
  - segger
  - xeniumranger
  - segmentation
  - conversion
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "segger":
      description: |
        SEGGER cell segmentation for spatial transcriptomics data.
      homepage: "https://github.com/EliHei2/segger_dev"
      documentation: "https://github.com/EliHei2/segger_dev"
      tool_dev_url: "https://github.com/EliHei2/segger_dev"
      doi: "no DOI available"
      licence: ["MIT"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - transcripts:
        type: file
        description: Transcripts parquet file output by SEGGER with per-transcript cell assignments.
        pattern: "*.parquet"
        ontologies: []

output:
  segmentation_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${meta.id}/segmentation.csv":
          type: file
          description: Per-transcript segmentation table (transcript_id, x, y, z, gene, cell, is_noise).
          pattern: "*/segmentation.csv"
          ontologies: []
  transcripts_parquet:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${meta.id}/transcripts.parquet":
          type: file
          description: Transcripts parquet file in XeniumRanger-compatible format.
          pattern: "*/transcripts.parquet"
          ontologies: []
  viz_polygons:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${meta.id}/segmentation_polygons.json":
          type: file
          description: GeoJSON FeatureCollection of cell segmentation polygons for visualization.
          pattern: "*/segmentation_polygons.json"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@heylf"
maintainers:
  - "@heylf"
