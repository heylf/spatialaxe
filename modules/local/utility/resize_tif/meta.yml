name: "resize_tif"
description: Resize a segmentation mask TIFF to match the full-resolution Xenium morphology image dimensions.
keywords:
  - xenium
  - tif
  - resize
  - mask
  - segmentation
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "tifffile":
      description: |
        Read and write TIFF files, including BigTIFF and OME-TIFF, in Python.
      homepage: "https://github.com/cgohlke/tifffile"
      documentation: "https://github.com/cgohlke/tifffile"
      tool_dev_url: "https://github.com/cgohlke/tifffile"
      doi: "no DOI available"
      licence: ["BSD-3-Clause"]
      identifier: ""
  - "numpy":
      description: |
        The fundamental package for scientific computing with Python.
      homepage: "https://numpy.org/"
      documentation: "https://numpy.org/doc/stable/"
      tool_dev_url: "https://github.com/numpy/numpy"
      doi: "10.1038/s41586-020-2649-2"
      licence: ["BSD-3-Clause"]
      identifier: ""
  - "scikit-image":
      description: |
        Image processing routines for SciPy.
      homepage: "https://scikit-image.org/"
      documentation: "https://scikit-image.org/docs/stable/"
      tool_dev_url: "https://github.com/scikit-image/scikit-image"
      doi: "10.7717/peerj.453"
      licence: ["BSD-3-Clause"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - transcripts:
        type: file
        description: Transcripts parquet file from the Xenium bundle.
        pattern: "*.parquet"
        ontologies: []
    - mask:
        type: file
        description: Segmentation mask TIFF to resize.
        pattern: "*.{tif,tiff}"
        ontologies: []
    - metadata:
        type: file
        description: Xenium experiment metadata file (used to read full-resolution dimensions).
        pattern: "*"
        ontologies: []

output:
  resized_mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "${meta.id}/resized_*.tif":
          type: file
          description: Segmentation mask TIFF resized to the full-resolution morphology image dimensions.
          pattern: "*/resized_*.tif"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_tifffile:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@khersameesh24"
maintainers:
  - "@khersameesh24"
