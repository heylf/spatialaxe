name: "upscale_mask"
description: Restore segmentation masks to the original image resolution using nearest-neighbor interpolation.
keywords:
  - xenium
  - mask
  - upscale
  - segmentation
  - cellpose
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "tifffile":
      description: |
        Read and write TIFF files, including BigTIFF and OME-TIFF, in Python.
      homepage: "https://github.com/cgohlke/tifffile"
      documentation: "https://github.com/cgohlke/tifffile"
      tool_dev_url: "https://github.com/cgohlke/tifffile"
      doi: "no DOI available"
      licence: ["BSD-3-Clause"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - mask:
        type: file
        description: Cellpose segmentation mask TIFF at downscaled resolution.
        pattern: "*.tif"
        ontologies: []
    - scale_info:
        type: file
        description: JSON file containing original image dimensions (orig_h, orig_w).
        pattern: "*.json"
        ontologies: []

output:
  upscaled_mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*/upscaled_*.tif":
          type: file
          description: Segmentation mask upscaled to the original image resolution.
          pattern: "*/upscaled_*.tif"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_tifffile:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - 'python3 -c "import tifffile; print(tifffile.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@an-altosian"
maintainers:
  - "@an-altosian"
