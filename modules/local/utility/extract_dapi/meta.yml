name: "extract_dapi"
description: Extract a single channel (default DAPI / channel 0) from a multi-channel OME-TIFF morphology image.
keywords:
  - xenium
  - dapi
  - morphology
  - ome-tiff
  - image processing
tools:
  - "python":
      description: |
        Python programming language interpreter.
      homepage: "https://www.python.org/"
      documentation: "https://docs.python.org/3/"
      tool_dev_url: "https://github.com/python/cpython"
      doi: "no DOI available"
      licence: ["PSF-2.0"]
      identifier: ""
  - "tifffile":
      description: |
        Read and write TIFF files, including BigTIFF and OME-TIFF, in Python.
      homepage: "https://github.com/cgohlke/tifffile"
      documentation: "https://github.com/cgohlke/tifffile"
      tool_dev_url: "https://github.com/cgohlke/tifffile"
      doi: "no DOI available"
      licence: ["BSD-3-Clause"]
      identifier: ""
  - "numpy":
      description: |
        The fundamental package for scientific computing with Python.
      homepage: "https://numpy.org/"
      documentation: "https://numpy.org/doc/stable/"
      tool_dev_url: "https://github.com/numpy/numpy"
      doi: "10.1038/s41586-020-2649-2"
      licence: ["BSD-3-Clause"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - image:
        type: file
        description: Multi-channel OME-TIFF morphology image.
        pattern: "*.{ome.tif,ome.tiff,tif,tiff}"
        ontologies: []

output:
  dapi:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_dapi.tif":
          type: file
          description: Single-channel TIFF containing the extracted channel.
          pattern: "*_dapi.tif"
          ontologies: []
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_tifffile:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - "python3 -c 'import tifffile; print(tifffile.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_numpy:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - numpy:
          type: string
          description: The tool name
      - "python3 -c 'import numpy; print(numpy.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - "python3 --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tifffile:
          type: string
          description: The tool name
      - "python3 -c 'import tifffile; print(tifffile.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - numpy:
          type: string
          description: The tool name
      - "python3 -c 'import numpy; print(numpy.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@an-altosian"
maintainers:
  - "@an-altosian"
